name: CI/CD Pipeline

on:
    push:
        branches: [ main ]
    workflow_dispatch:

jobs:
    build:
        uses: ./.github/workflows/build.yml
        secrets: inherit

    deploy:
        needs: [build]
        uses: ./.github/workflows/k8s-deploy.yml
        secrets: inherit
        with:
            image_tag: ${{ needs.build.outputs.image_tag }}
            ecr_registry: ${{ needs.build.outputs.ecr_registry }}
